services:
  db-account:
    image: postgres:16-alpine
    ports:
      - "6543:5432"
    volumes:
      - ../database/account.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
  db-order:
    image: postgres:16-alpine
    ports:
      - "6544:5432"
    volumes:
      - ../database/order.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app

  db-projection:
    image: mongo:8
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
  queue:
    image: rabbitmq:4.2-management
    ports:
      - 5672:5672
      - 15672:15672
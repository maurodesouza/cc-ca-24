services:
  db:
    image: postgres:16-alpine
    ports:
      - "6543:5432"
    volumes:
      - ../database/create.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
  queue:
    image: rabbitmq:4.2-management
    ports:
      - 5672:5672
      - 15672:15672